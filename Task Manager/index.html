<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A responsive task manager app with task persistence in local storage."
    />
    <title>Task Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="app-card" aria-labelledby="app-title">
        <header class="app-header">
          <div>
            <p class="eyebrow">Productivity board</p>
            <h1 id="app-title">Task Manager</h1>
            <p class="subtitle">
              Add tasks, mark them complete, remove what you no longer need, and keep everything
              saved locally.
            </p>
          </div>
          <div class="stats" aria-live="polite">
            <div>
              <strong id="totalCount">0</strong>
              <span>Total</span>
            </div>
            <div>
              <strong id="activeCount">0</strong>
              <span>Active</span>
            </div>
            <div>
              <strong id="completedCount">0</strong>
              <span>Done</span>
            </div>
          </div>
        </header>

        <form id="taskForm" class="task-form" autocomplete="off">
          <label class="sr-only" for="taskInput">New task</label>
          <input
            id="taskInput"
            name="task"
            type="text"
            placeholder="Write a task and press Enter"
            maxlength="120"
            required
          />
          <button type="submit">Add Task</button>
        </form>

        <section class="toolbar" aria-label="Task filters">
          <div class="filter-group" role="tablist" aria-label="Filter tasks">
            <button class="filter-btn active" type="button" data-filter="all">All</button>
            <button class="filter-btn" type="button" data-filter="active">Active</button>
            <button class="filter-btn" type="button" data-filter="completed">Completed</button>
          </div>
          <button id="clearCompleted" class="ghost-btn" type="button">Clear completed</button>
        </section>

        <section aria-labelledby="tasks-heading" class="tasks-section">
          <h2 id="tasks-heading">Tasks</h2>
          <ul id="taskList" class="task-list" aria-live="polite" aria-label="Task list"></ul>
          <p id="emptyState" class="empty-state">No tasks yet. Add one to get started.</p>
        </section>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
